name: CUDA Build CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.3.0-devel-ubuntu22.04
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        apt-get update
        apt-get install -y \
          cmake \
          build-essential \
          libglfw3-dev \
          libglew-dev \
          libsdl2-dev \
          pkg-config
    
    - name: Configure CMake
      working-directory: CMakePro_CUDA_LifeGame_V2
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CUDA_ARCHITECTURES="60;70;80;89;90" \
          -DLIB_ROOT=/usr \
          -DOPENGL_ROOT=/usr \
          -DSDL2_ROOT=/usr
    
    - name: Build
      working-directory: CMakePro_CUDA_LifeGame_V2/build
      run: cmake --build . --config Release -j$(nproc)
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: linux-build
        path: CMakePro_CUDA_LifeGame_V2/build/
        retention-days: 7

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        cuda_version: ['12.3.0']
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup MSVC
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Install CUDA Toolkit
      uses: Jimver/cuda-toolkit@v0.2.14
      with:
        cuda: '12.3.0'
    
    - name: Setup GLFW
      run: |
        vcpkg install glfw3:x64-windows glew:x64-windows sdl2:x64-windows
      env:
        VCPKG_DEFAULT_BINARY_DIR: ${{ github.workspace }}/vcpkg-bin
    
    - name: Configure CMake
      working-directory: CMakePro_CUDA_LifeGame_V2
      run: |
        mkdir build -ErrorAction SilentlyContinue
        cd build
        cmake .. `
          -G "Visual Studio 17 2022" `
          -A x64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_CUDA_ARCHITECTURES="60;70;80;89;90" `
          -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
    
    - name: Build
      working-directory: CMakePro_CUDA_LifeGame_V2/build
      run: cmake --build . --config Release --parallel
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: CMakePro_CUDA_LifeGame_V2/build/Release/
        retention-days: 7

  code-quality:
    runs-on: ubuntu-latest
    container:
      image: nvidia/cuda:12.3.0-devel-ubuntu22.04
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Install clang-format
      run: |
        apt-get update
        apt-get install -y clang-format
    
    - name: Check code formatting
      run: |
        echo "Checking code formatting..."
        find CMakePro_CUDA_LifeGame_V2 -name "*.cpp" -o -name "*.h" -o -name "*.cu" -o -name "*.cuh" | head -20
        # Optional: Add clang-format check
        # clang-format --dry-run --Werror $(find . -name "*.cpp" -o -name "*.h" -o -name "*.cu" -o -name "*.cuh")
    
    - name: Static analysis
      run: |
        echo "Static analysis placeholder - configure as needed"
        # Add clang-tidy or other static analysis tools here

  # Summary job that requires all build jobs to pass
  ci-success:
    needs: [build-linux, build-windows, code-quality]
    runs-on: ubuntu-latest
    if: success()
    
    steps:
    - name: CI Passed
      run: |
        echo "All CI checks passed!"
        echo "Linux build: OK"
        echo "Windows build: OK"
        echo "Code quality: OK"
