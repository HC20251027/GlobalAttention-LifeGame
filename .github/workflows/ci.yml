name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Verify project structure
      run: |
        echo "=== Project Structure Verification ==="
        
        required_files=(
          "CMakePro_CUDA_LifeGame_V2/CMakeLists.txt"
          "CMakePro_CUDA_LifeGame_V2/CMakeLists.txt.ci"
          "CMakePro_CUDA_LifeGame_V2/Main_cpp/CMakePro_cuda.cpp"
          "CMakePro_CUDA_LifeGame_V2/Main_header/Common.h"
          "CMakePro_CUDA_LifeGame_V2/Main_header/AttentionParams.h"
          "CMakePro_CUDA_LifeGame_V2/Main_header/CMakePro_cuda.h"
        )
        
        for file in "${required_files[@]}"; do
          if [ -f "$file" ]; then
            echo "✓ $file"
          else
            echo "✗ $file MISSING"
            exit 1
          fi
        done
        
        echo ""
        echo "CUDA Kernels:"
        for cu in CMakePro_CUDA_LifeGame_V2/CUDA_Kernels/*.cu; do
          echo "✓ $(basename $cu)"
        done
        
        echo ""
        echo "✅ All files verified"
    
    - name: Check CUDA kernel syntax
      run: |
        echo "=== CUDA Kernel Syntax Check ==="
        echo "Kernel declarations:"
        grep -rn "__global__" CMakePro_CUDA_LifeGame_V2/CUDA_Kernels/*.cu | wc -l
        echo "kernels found"
        
        echo "Extern C exports:"
        grep -rn 'extern "C"' CMakePro_CUDA_LifeGame_V2/CUDA_Kernels/*.cu | wc -l
        echo "exports found"
        
        echo "✅ CUDA syntax check passed"
    
    - name: Verify pre-built executable exists
      run: |
        if [ -f "EXE/CMakePro_CUDA_LifeGame/CMakePro_CUDA_LifeGame_V2.exe" ]; then
          echo "✅ Pre-built Windows executable found"
          ls -lh EXE/CMakePro_CUDA_LifeGame/CMakePro_CUDA_LifeGame_V2.exe
        else
          echo "⚠️ No pre-built executable found"
        fi
