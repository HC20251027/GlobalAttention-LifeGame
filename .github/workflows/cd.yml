name: CD - Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build-release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]
        include:
          - os: ubuntu-latest
            artifact_name: linux-release
            executable_suffix: ''
          - os: windows-latest
            artifact_name: windows-release
            executable_suffix: '.exe'
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup CUDA (Linux)
      if: runner.os == 'Linux'
      uses: Jimver/cuda-toolkit@v0.2.14
      with:
        cuda: '12.3.0'
    
    - name: Setup CUDA (Windows)
      if: runner.os == 'Windows'
      uses: Jimver/cuda-toolkit@v0.2.14
      with:
        cuda: '12.3.0'
    
    - name: Setup MSVC (Windows)
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1
    
    - name: Install dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          cmake \
          build-essential \
          libglfw3-dev \
          libglew-dev \
          libsdl2-dev
    
    - name: Install dependencies (Windows)
      if: runner.os == 'Windows'
      run: |
        vcpkg install glfw3:x64-windows glew:x64-windows sdl2:x64-windows
      env:
        VCPKG_DEFAULT_BINARY_DIR: ${{ github.workspace }}/vcpkg-bin
    
    - name: Configure CMake (Linux)
      if: runner.os == 'Linux'
      working-directory: CMakePro_CUDA_LifeGame_V2
      run: |
        mkdir -p build
        cd build
        cmake .. \
          -DCMAKE_BUILD_TYPE=Release \
          -DCMAKE_CUDA_ARCHITECTURES="60;70;80;89;90"
    
    - name: Configure CMake (Windows)
      if: runner.os == 'Windows'
      working-directory: CMakePro_CUDA_LifeGame_V2
      run: |
        mkdir build -ErrorAction SilentlyContinue
        cd build
        cmake .. `
          -G "Visual Studio 17 2022" `
          -A x64 `
          -DCMAKE_BUILD_TYPE=Release `
          -DCMAKE_CUDA_ARCHITECTURES="60;70;80;89;90" `
          -DCMAKE_TOOLCHAIN_FILE="${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake"
    
    - name: Build
      working-directory: CMakePro_CUDA_LifeGame_V2/build
      run: cmake --build . --config Release -j$(nproc 2>/dev/null || echo '4')
    
    - name: Package release (Linux)
      if: runner.os == 'Linux'
      working-directory: CMakePro_CUDA_LifeGame_V2
      run: |
        mkdir -p release_package
        cp build/CMakePro_CUDA_LifeGame_V2 release_package/ || true
        cp -r resources_LifeGame_V2 release_package/ || true
        tar -czvf ${{ matrix.artifact_name }}.tar.gz -C release_package .
    
    - name: Package release (Windows)
      if: runner.os == 'Windows'
      working-directory: CMakePro_CUDA_LifeGame_V2
      run: |
        mkdir release_package
        cp build/Release/CMakePro_CUDA_LifeGame_V2.exe release_package/ || true
        cp -r resources_LifeGame_V2 release_package/ || true
        Compress-Archive -Path release_package/* -DestinationPath ${{ matrix.artifact_name }}.zip
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.artifact_name }}
        path: |
          CMakePro_CUDA_LifeGame_V2/${{ matrix.artifact_name }}.*

  create-release:
    needs: build-release
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
    
    - name: Get version
      id: version
      run: |
        if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
          echo "VERSION=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
        else
          echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
        fi
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.VERSION }}
        name: Release ${{ steps.version.outputs.VERSION }}
        body: |
          ## Global Attention Life Game ${{ steps.version.outputs.VERSION }}
          
          ### Features
          - 4 Evolution Modes: Classic / GlobalStats / BlockAttention / FullAttention
          - Unified float data representation
          - Learnable attention parameters
          - Real-time interaction with ImGui UI
          
          ### Downloads
          - `linux-release.tar.gz` - Linux x64 executable
          - `windows-release.zip` - Windows x64 executable
          
          ### Requirements
          - NVIDIA GPU with CUDA support (Compute Capability 6.0+)
          - CUDA Runtime 12.x
          - OpenGL 4.3+ support
          
          For detailed instructions, see [README.md](./README.md)
        files: |
          artifacts/linux-release/*
          artifacts/windows-release/*
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
