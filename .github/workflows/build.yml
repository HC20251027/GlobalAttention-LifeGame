name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    container:
      image: nvidia/cuda:12.3.0-devel-ubuntu22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        apt-get update
        apt-get install -y \
          cmake \
          ninja-build \
          libglfw3-dev \
          libglew-dev \
          libsdl2-dev \
          libglm-dev \
          pkg-config
    
    - name: Setup CMakeLists for CI
      working-directory: CMakePro_CUDA_LifeGame_V2
      run: |
        cp CMakeLists.txt.ci CMakeLists.txt
    
    - name: Configure
      working-directory: CMakePro_CUDA_LifeGame_V2
      run: |
        cmake -B build \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DCMAKE_CUDA_ARCHITECTURES="60;70;80;89;90" \
          2>&1 | tee configure.log
    
    - name: Build
      working-directory: CMakePro_CUDA_LifeGame_V2
      run: |
        cmake --build build --config ${{ env.BUILD_TYPE }} -j$(nproc) 2>&1 | tee build.log
    
    - name: Prepare package
      working-directory: CMakePro_CUDA_LifeGame_V2
      run: |
        mkdir -p package
        cp build/CMakePro_CUDA_LifeGame_V2 package/ 2>/dev/null || echo "Binary not found, checking build dir:"
        ls -la build/ | head -20
        cp -r resources_LifeGame_V2 package/
        tar -czf GlobalAttention-LifeGame-linux-x64.tar.gz -C package .
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-build
        path: CMakePro_CUDA_LifeGame_V2/GlobalAttention-LifeGame-linux-x64.tar.gz
        retention-days: 7
    
    - name: Upload logs on failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: linux-logs
        path: |
          CMakePro_CUDA_LifeGame_V2/configure.log
          CMakePro_CUDA_LifeGame_V2/build.log
        retention-days: 3

  build-windows:
    runs-on: windows-2022
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup CUDA
      id: cuda
      uses: Jimver/cuda-toolkit@v0.2.14
      with:
        cuda: '12.3.0'
        use-github-cache: true
      continue-on-error: true
    
    - name: Check CUDA installation
      if: steps.cuda.outcome == 'success'
      shell: pwsh
      run: |
        nvcc --version
        Get-Command nvcc
    
    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: 'a42af01b72c28a8e1d7b48107b33e4f286a55ef6'
    
    - name: Install dependencies
      if: steps.cuda.outcome == 'success'
      run: |
        vcpkg install glfw3:x64-windows glew:x64-windows sdl2:x64-windows glm:x64-windows
    
    - name: Setup CMakeLists for CI
      if: steps.cuda.outcome == 'success'
      working-directory: CMakePro_CUDA_LifeGame_V2
      shell: pwsh
      run: |
        Copy-Item CMakeLists.txt.ci CMakeLists.txt -Force
    
    - name: Configure
      if: steps.cuda.outcome == 'success'
      working-directory: CMakePro_CUDA_LifeGame_V2
      shell: cmd
      run: |
        cmake -B build -G "Visual Studio 17 2022" -A x64 ^
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} ^
          -DCMAKE_CUDA_ARCHITECTURES="60;70;80;89;90" ^
          -DCMAKE_TOOLCHAIN_FILE=%VCPKG_ROOT%\scripts\buildsystems\vcpkg.cmake
    
    - name: Build
      if: steps.cuda.outcome == 'success'
      working-directory: CMakePro_CUDA_LifeGame_V2
      run: cmake --build build --config ${{ env.BUILD_TYPE }} --parallel
    
    - name: Prepare package
      if: steps.cuda.outcome == 'success'
      working-directory: CMakePro_CUDA_LifeGame_V2
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path package
        Copy-Item build\Release\CMakePro_CUDA_LifeGame_V2.exe package\ -ErrorAction SilentlyContinue
        Copy-Item -Recurse resources_LifeGame_V2 package\
        Compress-Archive -Path package\* -DestinationPath GlobalAttention-LifeGame-windows-x64.zip
    
    - name: Upload artifact
      if: steps.cuda.outcome == 'success'
      uses: actions/upload-artifact@v4
      with:
        name: windows-build
        path: CMakePro_CUDA_LifeGame_V2/GlobalAttention-LifeGame-windows-x64.zip
        retention-days: 7
    
    - name: Skip Windows build if CUDA not available
      if: steps.cuda.outcome == 'failure'
      shell: pwsh
      run: |
        Write-Host "CUDA installation failed, skipping Windows build"
        Write-Host "This is expected in environments without NVIDIA support"

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: false
    
    - name: List artifacts
      run: |
        echo "Downloaded artifacts:"
        find artifacts -type f -ls 2>/dev/null || echo "No artifacts found"
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/linux-build/*.tar.gz
          artifacts/windows-build/*.zip
        generate_release_notes: true
        fail_on_unmatched_files: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
