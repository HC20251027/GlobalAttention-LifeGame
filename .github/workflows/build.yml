name: Build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  BUILD_TYPE: Release

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    container:
      image: nvidia/cuda:12.3.0-devel-ubuntu22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Install dependencies
      run: |
        apt-get update
        apt-get install -y \
          cmake \
          ninja-build \
          libglfw3-dev \
          libglew-dev \
          libsdl2-dev \
          libglm-dev \
          pkg-config
    
    - name: Setup CMakeLists for CI
      working-directory: CMakePro_CUDA_LifeGame_V2
      run: |
        cp CMakeLists.txt.ci CMakeLists.txt
    
    - name: Configure
      working-directory: CMakePro_CUDA_LifeGame_V2
      run: |
        cmake -B build \
          -G Ninja \
          -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} \
          -DCMAKE_CUDA_ARCHITECTURES="60;70;80;89;90"
    
    - name: Build
      working-directory: CMakePro_CUDA_LifeGame_V2
      run: |
        cmake --build build --config ${{ env.BUILD_TYPE }} -j$(nproc)
    
    - name: Prepare package
      working-directory: CMakePro_CUDA_LifeGame_V2
      run: |
        mkdir -p package
        cp build/CMakePro_CUDA_LifeGame_V2 package/ 2>/dev/null || echo "Binary not found"
        ls -la build/ | head -20
        cp -r resources_LifeGame_V2 package/
        tar -czf GlobalAttention-LifeGame-linux-x64.tar.gz -C package .
    
    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: linux-build
        path: CMakePro_CUDA_LifeGame_V2/GlobalAttention-LifeGame-linux-x64.tar.gz
        retention-days: 7

  # Windows 构建需要本地环境，CI 只做代码验证
  validate-windows:
    runs-on: windows-2022
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Validate project structure
      shell: pwsh
      run: |
        Write-Host "=== Windows Build Validation ==="
        Write-Host "Note: CUDA compilation requires local Windows environment with:"
        Write-Host "  - Visual Studio 2022 with C++ workload"
        Write-Host "  - CUDA Toolkit 12.x"
        Write-Host "  - GLFW, GLEW, SDL2 libraries"
        Write-Host ""
        
        # Check required files
        $requiredFiles = @(
          "CMakePro_CUDA_LifeGame_V2/CMakeLists.txt",
          "CMakePro_CUDA_LifeGame_V2/Main_cpp/CMakePro_cuda.cpp",
          "CMakePro_CUDA_LifeGame_V2/Main_header/Common.h",
          "CMakePro_CUDA_LifeGame_V2/Main_header/AttentionParams.h"
        )
        
        $allPresent = $true
        foreach ($file in $requiredFiles) {
          if (Test-Path $file) {
            Write-Host "✓ $file"
          } else {
            Write-Host "✗ $file (missing)"
            $allPresent = $false
          }
        }
        
        if (-not $allPresent) {
          exit 1
        }
        
        Write-Host ""
        Write-Host "✓ All required files present"
        Write-Host "✓ Project structure validated for Windows build"

  release:
    needs: [build-linux, validate-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts
        merge-multiple: false
    
    - name: List artifacts
      run: |
        echo "Downloaded artifacts:"
        find artifacts -type f -ls 2>/dev/null || echo "No artifacts found"
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          artifacts/linux-build/*.tar.gz
        generate_release_notes: true
        fail_on_unmatched_files: false
        body: |
          ## 🧬 Global Attention Life Game ${{ github.ref_name }}
          
          ### 📦 Downloads
          - **Linux**: `GlobalAttention-LifeGame-linux-x64.tar.gz`
          
          ### 🪟 Windows Build
          Windows 构建需要在本地环境进行：
          
          **Requirements:**
          - Visual Studio 2022 with "Desktop development with C++" workload
          - CUDA Toolkit 12.x (https://developer.nvidia.com/cuda-downloads)
          - vcpkg (for GLFW, GLEW, SDL2)
          
          **Build Steps:**
          ```powershell
          # Install dependencies
          vcpkg install glfw3:x64-windows glew:x64-windows sdl2:x64-windows glm:x64-windows
          
          # Configure and build
          cd CMakePro_CUDA_LifeGame_V2
          cmake -B build -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake"
          cmake --build build --config Release
          ```
          
          For detailed instructions, see [README.md](./README.md).
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
